---
name: OpenSSL Docker Image

'on':
  push:
    paths:
      - Dockerfile
      - VERSION

  pull_request:
    paths:
      - Dockerfile
      - VERSION

jobs:
  build:
    if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Grab the version to use.
        id: v1
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Grab the timestamp to use.
        id: v2
        run: echo "timestamp=$(cat GITHUB_SHA:0:12)" >> $GITHUB_OUTPUT

      - name: Build the Docker image.
        uses: docker/build-push-action@v7
        with:
          build-args: |
            VERSION=${{ steps.v1.outputs.version }}
          tags: dcjulian29/openssl:${{ steps.v1.outputs.version }}-${{ steps.v2.outputs.timestamp }}

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Login to DockerHub.
        uses: docker/login-action@v4
        with:
          username: dcjulian29
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Grab the version to use.
        id: v1
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image.
        uses: docker/build-push-action@v7
        with:
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
          push: true
          tags: dcjulian29/openssl:${{ steps.vars.outputs.version }},dcjulian29/openssl:latest
